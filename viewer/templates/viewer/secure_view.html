<!DOCTYPE html>
<html>
<head>
    <title>Secure Viewer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        .watermark {
            position: fixed;
            top: 40%;
            left: 30%;
            font-size: 30px;
            color: rgba(0, 0, 0, 0.2);
            transform: rotate(-30deg);
            z-index: 9999;
            pointer-events: none;
        }

        #pdf-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
        }

        * {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
    </style>
</head>
<body>

<div class="watermark">
    {{ username }} | {{ ip }} | {{ now|date:"Y-m-d H:i:s" }}
</div>

{% if document.file_type == 'pdf' %}

    <div id="pdf-container">
        <canvas id="pdf-canvas"></canvas>
    </div>
    <script>
        // Disable right click
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Disable F12, Ctrl+U, Ctrl+S, Ctrl+Shift+I
        document.onkeydown = function(e) {
            if (
                e.keyCode == 123 || // F12
                (e.ctrlKey && e.shiftKey && e.keyCode == 73) || // Ctrl+Shift+I
                (e.ctrlKey && e.keyCode == 85) || // Ctrl+U
                (e.ctrlKey && e.keyCode == 83)    // Ctrl+S
            ) {
                return false;
            }
        };
    </script>


    <!-- ✅ Load PDF.js from jsDelivr -->
   <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script>
        // ✅ Set the worker path after loading the library
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

        const url = "{{ document_url }}";
        const watermarkText = `{{ username }} | {{ ip }} | {{ now|date:'Y-m-    d H:i:s' }}`;
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');

        let pdfDoc = null;
        let pageNum = 1;

        function renderPDFPage() {
            if (!pdfDoc) return;

            pdfDoc.getPage(pageNum).then(function(page) {
                const container = document.getElementById('pdf-container');
                const containerWidth = container.offsetWidth || window.innerWidth;
                const containerHeight = container.offsetHeight || window.innerHeight;

                const unscaledViewport = page.getViewport({ scale: 1 });
                const scale = Math.min(
                    containerWidth / unscaledViewport.width,
                    containerHeight / unscaledViewport.height
                );

                const viewport = page.getViewport({ scale: scale });
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };

                page.render(renderContext).promise.then(function() {
                    // ✅ Watermark overlay
                    ctx.save();
                    ctx.globalAlpha = 0.2;
                    const fontSize = Math.max(24, Math.floor(canvas.width / 20));
                    ctx.font = fontSize + "px Arial";
                    ctx.translate(canvas.width * 0.5, canvas.height * 0.5);
                    ctx.rotate(-Math.PI / 6);
                    ctx.fillStyle = "#000";
                    ctx.textAlign = "center";
                    ctx.fillText(watermarkText, 0, 0);
                    ctx.restore();
                });
            });
        }

        function showError(message) {
            const container = document.getElementById('pdf-container');
            container.innerHTML = `<div style='color:red;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;border-radius:8px;'>PDF Error: ${message}</div>`;
        }

        function loadPDF() {
            pdfjsLib.getDocument(url).promise.then(function(pdf) {
                pdfDoc = pdf;
                renderPDFPage();
            }).catch(function(error) {
                showError(error.message || 'Unable to load PDF.');
            });
        }

        window.addEventListener('resize', renderPDFPage);
        document.addEventListener('DOMContentLoaded', loadPDF);
    </script>

{% elif document.file_type == 'image' %}
    <img src="{{ document.file.url }}" style="width:100%; height:auto;" />
{% endif %}

</body>
</html>
